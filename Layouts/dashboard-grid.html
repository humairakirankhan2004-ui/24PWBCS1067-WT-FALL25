<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 250px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "sidebar header"
        "sidebar main";
      min-height: 100vh;
      background-color: #f5f6fa;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      grid-area: sidebar;
      background-color: #2f3640;
      color: white;
      padding: 1rem;
      position: fixed;
      top: 0;
      bottom: 0;
      width: 250px;
      transition: all 0.3s ease;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 600;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      padding: 0.8rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .sidebar ul li:hover {
      background-color: #40739e;
    }

    /* ===== Header ===== */
    header {
      grid-area: header;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.5rem;
    }

    header input {
      padding: 0.5rem 1rem;
      border: 1px solid #ccc;
      border-radius: 20px;
      width: 200px;
    }

    /* ===== Main Content ===== */
    main {
      grid-area: main;
      padding: 2rem;
      margin-left: 250px;
      transition: margin-left 0.3s;
    }

    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .card {
      background-color: white;
      flex: 1;
      min-width: 220px;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
    }

    .card h3 {
      font-size: 1rem;
      color: #555;
    }

    .card p {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 0.5rem;
      color: #2f3640;
    }

    /* ===== Responsive ===== */
    @media (max-width: 1024px) {
      body {
        grid-template-columns: 80px 1fr;
      }

      .sidebar {
        width: 80px;
      }

      .sidebar h2, .sidebar ul li {
        text-align: center;
        font-size: 0.8rem;
      }

      main {
        margin-left: 80px;
      }
    }

    @media (max-width: 768px) {
      body {
        grid-template-areas:
          "header"
          "main";
      }

      .sidebar {
        position: fixed;
        left: -250px;
      }

      main {
        margin-left: 0;
      }
    }

    @media (max-width: 500px) {
      .stats {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <aside class="sidebar">
    <h2>Admin</h2>
    <ul>
      <li>Dashboard</li>
      <li>Users</li>
      <li>Reports</li>
      <li>Settings</li>
      <li>Logout</li>
    </ul>
  </aside>

  <header>
    <h1>Dashboard</h1>
    <input type="text" placeholder="Search...">
  </header>

  <main>
    <section class="stats">
      <div class="card">
        <h3>Total Users</h3>
        <p>1,245</p>
      </div>
      <div class="card">
        <h3>Active Sessions</h3>
        <p>342</p>
      </div>
      <div class="card">
        <h3>Sales Today</h3>
        <p>$4,560</p>
      </div>
      <div class="card">
        <h3>Pending Orders</h3>
        <p>27</p>
      </div>
    </section>
  </main>
</body>
</html>
